name: HN Sort Validation

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test:unit

      - name: Run validation
        run: npm test

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: results.json

      - name: Upload failure screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot-${{ github.run_id }}
          path: failure.png
